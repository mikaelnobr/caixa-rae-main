version: '3.8'

services:
  streamlit_app:
    build: .
    container_name: caixa_rae_app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./service_account.json:/app/service_account.json:ro
    expose:
      - "8501"

  nginx:
    image: nginx:alpine
    container_name: caixa_rae_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - streamlit_app
