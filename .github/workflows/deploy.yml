name: Deploy to Oracle VM

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy deployment files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USERNAME }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          source: ".,!.git"
          target: "~/caixa-rae"
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USERNAME }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script: |
            cd ~/caixa-rae

            # Inicializar certificados HTTPS na primeira execucao
            if [ ! -d "./certbot/conf/live/extrator-rae.duckdns.org" ]; then
              echo "Certificados nao encontrados. Executando inicializacao..."
              chmod +x ./init-letsencrypt-duckdns.sh
              ./init-letsencrypt-duckdns.sh
            fi

            # Rebuild e restart dos containers
            docker compose build
            docker compose down --remove-orphans
            docker compose up -d --force-recreate

            # Remover imagens sem uso
            docker image prune -f
