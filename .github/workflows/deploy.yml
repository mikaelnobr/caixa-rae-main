name: Deploy to Oracle VM

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy deployment files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USERNAME }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          source: "."
          target: "~/caixa-rae"
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USERNAME }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script: |
            cd ~/caixa-rae

            # Ensure the service account file and .env exist before starting
            if [ ! -f "service_account.json" ]; then
              echo "Error: service_account.json not found on the server. Please upload it manually."
              exit 1
            fi
            if [ ! -f ".env" ]; then
              echo "Error: .env not found on the server. Please upload it manually."
              exit 1
            fi

            docker compose build
            
            # Initialize Let's Encrypt certificates if they don't exist
            if [ ! -d "./certbot/conf/live/extrator-rae.duckdns.org" ]; then
              echo "Certificates not found. Running initialization script..."
              chmod +x ./init-letsencrypt.sh
              ./init-letsencrypt.sh
            fi

            # Build and restart containers
            docker compose down
            docker compose up -d

            # Prune dangling images to save space
            docker image prune -f
